name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: hombre355/tesla-tracker-backend
  FRONTEND_IMAGE: hombre355/tesla-tracker-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: tesla
          POSTGRES_PASSWORD: tesla
          POSTGRES_DB: tesla_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://tesla:tesla@localhost:5432/tesla_tracker_test
          FRONTEND_URL: http://localhost:5173
          PYTHONPATH: ${{ github.workspace }}/backend
        run: cd backend && pytest tests/ -v --tb=short

  build-backend:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:tesla-tracker

      - name: Deploy to NAS via Tailscale SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NAS_TAILSCALE_IP }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 9022
          script: |
            mkdir -p ~/tesla-tracker ~/tesla-tracker/pgdata ~/tesla-tracker/backups
            cd ~/tesla-tracker

            # Backup database before any changes
            if docker compose ps db --quiet 2>/dev/null | grep -q .; then
              docker compose exec -T db pg_dump -U tesla tesla_tracker \
                > ~/tesla-tracker/backups/backup_$(date +%Y%m%d_%H%M%S).sql
              ls -t ~/tesla-tracker/backups/backup_*.sql 2>/dev/null | tail -n +6 | xargs -r rm --
            fi

            cat > docker-compose.yml << 'COMPOSE_EOF'
            services:
              db:
                image: postgres:17-alpine
                restart: always
                environment:
                  POSTGRES_USER: tesla
                  POSTGRES_PASSWORD: tesla
                  POSTGRES_DB: tesla_tracker
                volumes:
                  - ./pgdata:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U tesla -d tesla_tracker"]
                  interval: 5s
                  timeout: 5s
                  retries: 10
                  start_period: 10s
              backend:
                image: ghcr.io/hombre355/tesla-tracker-backend:latest
                restart: always
                env_file: .env
                environment:
                  DATABASE_URL: postgresql+asyncpg://tesla:tesla@db:5432/tesla_tracker
                depends_on:
                  db:
                    condition: service_healthy
              frontend:
                image: ghcr.io/hombre355/tesla-tracker-frontend:latest
                restart: always
                ports:
                  - "8080:80"
                  - "8443:443"
                volumes:
                  - /var/lib/tailscale/certs/${TAILSCALE_HOSTNAME}.crt:/etc/nginx/certs/nas.crt:ro
                  - /var/lib/tailscale/certs/${TAILSCALE_HOSTNAME}.key:/etc/nginx/certs/nas.key:ro
                depends_on:
                  - backend
            COMPOSE_EOF
            docker compose pull
            docker compose up -d
            docker image prune -f

  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      packages: write

    steps:
      - name: Delete old backend versions (keep latest 2)
        uses: actions/delete-package-versions@v5
        with:
          package-name: tesla-tracker-backend
          package-type: container
          min-versions-to-keep: 2

      - name: Delete old frontend versions (keep latest 2)
        uses: actions/delete-package-versions@v5
        with:
          package-name: tesla-tracker-frontend
          package-type: container
          min-versions-to-keep: 2
