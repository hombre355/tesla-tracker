# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Tailscale-provisioned cert (mounted from NAS at /var/lib/tailscale/certs/)
    ssl_certificate     /etc/nginx/certs/nas.crt;
    ssl_certificate_key /etc/nginx/certs/nas.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # React Router — all non-file requests fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block API documentation endpoints
    location ~ ^/api/(docs|redoc|openapi.json) {
        return 404;
    }

    # Proxy /api/* to the backend FastAPI container
    # No trailing slash on proxy_pass: preserves the /api/ prefix
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Long-term cache for hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
